name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  # pnpm version comes from package.json "packageManager"; specifying it
  # here too made pnpm/action-setup@v4 fail with "multiple versions".
  NODE_VERSION: 20

jobs:
  guards:
    name: Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: architecture.md changes need an [architecture] marker
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -e
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD \
               | grep -qx 'architecture.md'; then
            exit 0
          fi
          # Every commit that touches architecture.md must carry the
          # `[architecture]` marker in its subject line. Implementation PRs
          # leave architecture.md untouched; explicit architecture-update
          # PRs opt in via the marker and a maintainer review.
          violations=$(
            git log "origin/${{ github.base_ref }}..HEAD" \
                --format='%H %s' -- architecture.md \
              | grep -v '\[architecture\]' || true
          )
          if [ -n "$violations" ]; then
            echo "::error::architecture.md was modified by commits that lack the [architecture] marker:"
            echo "$violations"
            exit 1
          fi

      - name: No hex colors outside tokens.css
        shell: bash
        run: |
          set -e
          violations=$(grep -rEn '#[0-9a-fA-F]{3}([0-9a-fA-F]{3})?\b' \
            apps/desktop/src \
            --include='*.ts' --include='*.tsx' \
            --include='*.css' --include='*.scss' \
            --exclude='tokens.css' || true)
          if [ -n "$violations" ]; then
            echo "::error::Hex color literals must live only in tokens.css (see architecture.md §5.2)."
            echo "$violations"
            exit 1
          fi

      - name: No hardcoded font-family declarations
        shell: bash
        run: |
          set -e
          # font-family is allowed only when it references a --font-* token via var().
          violations=$(grep -rEn 'font-family\s*:' \
            apps/desktop/src \
            --include='*.ts' --include='*.tsx' \
            --include='*.css' --include='*.scss' \
            --exclude='tokens.css' \
            | grep -v 'var(--font-' || true)
          if [ -n "$violations" ]; then
            echo "::error::font-family must reference a --font-* token (see architecture.md §5.2)."
            echo "$violations"
            exit 1
          fi

      - name: All FS writes must go through services/fs.rs
        shell: bash
        run: |
          set -e
          violations=$(grep -rEn 'std::fs::write|fs::write\b|tokio::fs::write' \
            crates/core/src \
            apps/desktop/src-tauri/src \
            --include='*.rs' \
            --exclude-dir=services || true)
          if [ -n "$violations" ]; then
            echo "::error::All writes must go through services/fs.rs::atomic_write (see architecture.md §9)."
            echo "$violations"
            exit 1
          fi

      - name: No package-lock.json / yarn.lock (pnpm only)
        run: |
          if [ -f package-lock.json ] || [ -f yarn.lock ]; then
            echo "::error::Repository is pnpm-only. Remove package-lock.json / yarn.lock."
            exit 1
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -C apps/desktop lint
      - name: Typecheck
        run: pnpm -C apps/desktop typecheck
      - name: Unit tests (Vitest)
        run: pnpm -C apps/desktop test
      - name: Vite production build
        run: pnpm -C apps/desktop build

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri v2 system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssh2-1-dev
      # Pinned rather than @stable so rustfmt output is reproducible
      # against what contributors run locally (rustfmt can reformat
      # differently across toolchain versions).
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      # tauri::generate_context! embeds the frontend dist at compile time,
      # so clippy/test need it to exist. This job doesn't build the
      # frontend (that's the Frontend/build jobs), so stub it.
      - name: Stub frontend dist for generate_context!
        run: |
          mkdir -p apps/desktop/dist
          printf '<!doctype html><title>ci</title>' > apps/desktop/dist/index.html
      - name: cargo clippy (deny warnings)
        run: |
          cargo clippy \
            --workspace \
            --all-targets --all-features \
            -- -D warnings
      - name: cargo test
        run: |
          cargo test \
            --workspace --all-features

  build:
    name: Build (${{ matrix.os }})
    needs: [guards, frontend, rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri v2 system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssh2-1-dev
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.90.0 # pinned; see the Rust job
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: build-${{ matrix.os }}
      - run: pnpm install --frozen-lockfile
      - name: Tauri debug build
        run: pnpm -C apps/desktop tauri build --debug
